name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Install .NET workloads
        run: dotnet workload install wasm-tools

      - name: Restore NuGet Packages
        run: dotnet restore TownHall.slnx

      - name: Build
        run: dotnet build TownHall.slnx --no-restore

      - name: Test
        run: dotnet test TownHall.slnx --no-build
